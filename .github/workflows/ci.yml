name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  TERM: dumb

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        cc: [gcc, clang]
    steps:
      - uses: actions/checkout@v5

      - name: Run tests
        run: make CC=${{ matrix.cc }} test

  test-sanitizers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Run tests (ASan + UBSan)
        run: |
          make CC=clang test \
            CFLAGS="-Wall -Wextra -std=c11 -g \
              -fsanitize=address,undefined \
              -fno-omit-frame-pointer \
              -Wno-initializer-overrides"

  build-raylib:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install X11/GL dev headers
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxrandr-dev libxinerama-dev \
            libxcursor-dev libxi-dev libgl-dev

      - name: Cache Raylib
        id: cache-raylib
        uses: actions/cache@v5
        with:
          path: ~/opt/raylib
          key: raylib-5.5-linux-x64

      - name: Build & install Raylib
        if: steps.cache-raylib.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch 5.5 \
            https://github.com/raysan5/raylib.git /tmp/raylib
          cd /tmp/raylib/src
          make PLATFORM=PLATFORM_DESKTOP -j$(nproc)
          mkdir -p $HOME/opt/raylib/include $HOME/opt/raylib/lib
          cp raylib.h raymath.h rlgl.h rcamera.h $HOME/opt/raylib/include/
          cp libraylib.a $HOME/opt/raylib/lib/

      - name: Build all Raylib demos
        run: make all

  build-sdl3:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install X11/Wayland dev headers
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxrandr-dev libxinerama-dev \
            libxcursor-dev libxi-dev libxext-dev \
            libwayland-dev libxkbcommon-dev

      - name: Cache SDL3
        id: cache-sdl3
        uses: actions/cache@v5
        with:
          path: ~/opt/sdl3
          key: sdl3-release-3.2.8-linux-x64

      - name: Build & install SDL3
        if: steps.cache-sdl3.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch release-3.2.8 \
            https://github.com/libsdl-org/SDL.git /tmp/SDL
          cmake -S /tmp/SDL -B /tmp/SDL/build \
            -DCMAKE_INSTALL_PREFIX=$HOME/opt/sdl3 \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build /tmp/SDL/build -j$(nproc)
          cmake --install /tmp/SDL/build

      - name: Build SDL3 demo
        run: make sdl3_demo

  test-werror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Run tests (warnings-as-errors)
        run: make CC=clang test CFLAGS="-Wall -Wextra -Werror -std=c11 -Wno-initializer-overrides"
