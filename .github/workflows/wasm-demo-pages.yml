name: Deploy WASM Demo to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'demos/dashboard/**'
      - 'demos/gallery.c'
      - 'demos/gallery_perf.h'
      - 'demos/assets/**'
      - 'web/**'
      - 'wollix.h'
      - 'wollix_wasm.h'
      - 'Makefile'
      - '.github/workflows/wasm-demo-pages.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Verify toolchain
        run: |
          clang --version
          ld.lld --version || sudo apt-get install -y lld

      - name: Build packaged site (dashboard at root + gallery under /gallery)
        run: make pages-site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist/wasm-demo

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
