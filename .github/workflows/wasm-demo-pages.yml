name: Deploy WASM Demo to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Verify toolchain
        run: |
          clang --version
          ld.lld --version || sudo apt-get install -y lld

      - name: Build packaged site
        run: make wasm-site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist/wasm-demo

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
