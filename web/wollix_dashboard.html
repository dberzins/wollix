<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Wollix Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0f1419;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
    </style>
</head>

<body>
    <canvas id="wlx-canvas"></canvas>
    <script>
        // Point the shared WASM host at the dashboard build. Set before the
        // module script runs so wollix_wasm.js picks it up.
        window.WLX_WASM_FILE = "dashboard.wasm";
    </script>
    <script type="module" src="wollix_wasm.js"></script>
</body>

</html>
